<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Prayer Times Offline</title>
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <script>
        const ICON = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 225 225'%3E%3Crect width='225' height='225' fill='%231a1a1a'/%3E%3Cpath d='M107 179.5l-24-1-12-4-15-9-16.5-18.5-9-25 2-29 12-23 20.5-17.5 24-8h18l15 4 19 11 9.5 10.5-7.5 2.5-16-13-21-7-5.5.5-.5 8.5-4.5-.5-.5-8.5-20 4-15 9-13.5 15.5-6 13-2 15 8.5.5.5 4.5-8.5.5-.5 6.5 3 12 7 13 18.5 17.5 22 8 6.5-.5.5-8.5 4.5.5.5 8.5 23.5-5.5-.5 8.5zm-7-62l-5 0-3-3-21.5-.5.5-4.5 21 0 3.5-3.5.5-31.5 4.5 1.5v31l3 3v4zm53-14l-10.5-3.5-7-20 22.5-6.5 6.5 19.5-6.5 8.5zm27 68l-36.5-.5-.5-9.5 17.5.5-19-3-4-23v-16l2-8 4.5-4.5 6-1 6 3 4.5 5.5 3.5 12.5 13-6 5.5 6.5-3.5 5.5-13 7-9.5 0-9.5-7.5 6.5 7.5 11 1 4 6 20 6 4.5 4.5v7l-5.5 4.5zm6-46l-6.5-4.5 9-7 1.5-4.5 1.5 5.5zm-44 46l-11 0-2.5-4.5 3.5-3.5 8-1z' fill='%23f5f5f5'/%3E%3C/svg%3E";

        // Favicon + apple-touch icon
        document.head.insertAdjacentHTML('beforeend',
            `<link rel="icon" type="image/svg+xml" href="${ICON}">
       <link rel="apple-touch-icon" href="${ICON}">`
        );

        // Manifest
        const mLink = document.createElement('link');
        mLink.rel = 'manifest';
        mLink.href = URL.createObjectURL(new Blob([JSON.stringify({
            name: "Prayer Times", short_name: "Prayer", display: "standalone",
            orientation: "portrait", background_color: "#1a1a1a", theme_color: "#1a1a1a",
            start_url: "./", version: "1.0.6",
            icons: [{ src: ICON, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }]
        })], { type: 'application/manifest+json' }));
        document.head.appendChild(mLink);
    </script>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --surface-dark: #1c1c1c;
            --text-dark: #e0e0e0;
            --silver-dark: #a0a0a0;
            --bg-light: #e8e8e8;
            --surface-light: #ffffff;
            --text-light: #1a1a1a;
            --silver-light: #606060;
            --accent-orange: #f57c00;
            --accent-emerald: #10b981;
            --accent-purple: #9b59b6;
            --accent-pink: #e91e8f;
            --accent-aqua: #00bcd4;
            --bg: var(--bg-dark);
            --surface: var(--surface-dark);
            --text: var(--text-dark);
            --silver: var(--silver-dark);
            --accent: var(--accent-orange);
        }

        body {
            margin: 18px auto 28px;
            padding: 0 14px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s, color 0.2s;
            max-width: 560px;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        button,
        input[type="date"] {
            flex: 1 1 0;
            min-width: 100px;
            padding: 12px 6px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 0.95rem;
            background: var(--surface);
            color: var(--text);
            border: 1.8px solid var(--silver);
            outline: none;
            transition: border 0.15s, background 0.15s;
            cursor: pointer;
            text-align: center;
        }

        button:hover,
        input[type="date"]:focus {
            border-color: var(--accent);
        }

        .card {
            background: var(--surface);
            border-radius: 22px;
            padding: 20px 18px;
            margin-bottom: 18px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(128, 128, 128, 0.08);
        }

        h2 {
            margin: 0 0 12px;
            font-size: 0.95rem;
            color: var(--silver);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .countdown {
            font-size: 2.4rem;
            font-weight: 700;
            margin: 6px 0 4px;
            color: var(--accent);
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--silver);
            font-weight: 400;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(128, 128, 128, 0.12);
        }

        .flex-between:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .event-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .event-time {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .offset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 12px 10px;
            margin-top: 6px;
        }

        .offset-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .offset-item label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--silver);
            font-weight: 600;
        }

        .offset-item input {
            background: var(--bg);
            border: 1.8px solid var(--silver);
            color: var(--text);
            padding: 10px 6px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            outline: none;
            transition: border 0.15s;
            flex: unset;
        }

        .offset-item input:focus {
            border-color: var(--accent);
        }

        .locate-btn {
            background: transparent;
            border: 1.8px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 8px;
            flex: unset;
            min-width: unset;
        }

        .locate-btn:hover {
            background: var(--accent);
            color: #0a0a0a;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .saved-hint {
            font-size: 0.7rem;
            margin-top: 8px;
            opacity: 0.7;
        }

        .asr-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .asr-btn.active {
            background: var(--accent) !important;
            color: var(--bg) !important;
            border: none !important;
        }

        .asr-btn:not(.active) {
            background: var(--surface);
            color: var(--silver);
            border: 1.8px solid var(--silver);
        }
    </style>
</head>

<body>

    <div class="controls">
        <button id="themeToggle">🌓 Theme</button>
        <button id="accentToggle">🎨 Accent</button>
        <input type="date" id="datePicker" />
    </div>

    <div class="card" style="padding: 18px 16px">
        <h2>⏱️ TIME OFFSETS (minutes)</h2>
        <div class="offset-grid" id="offsetGrid"></div>
        <div style="margin-top:16px; padding-top:12px; border-top:1px solid rgba(128,128,128,0.12)">
            <label
                style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--silver); font-weight:600; display:block; margin-bottom:6px">Asr
                Calculation</label>
            <div style="display:flex; gap:8px">
                <button id="asrStandard" class="asr-btn active">Standard (Shafi'i)</button>
                <button id="asrHanafi" class="asr-btn">Hanafi</button>
            </div>
        </div>
        <div class="saved-hint" id="saveIndicator">💾 offsets saved automatically</div>
    </div>

    <div class="card">
        <div class="status-row">
            <h2 style="margin:0">📍 Status</h2>
            <button class="locate-btn" id="retryLocationBtn">⟳ Refresh</button>
        </div>
        <div id="statusDisplay" class="subtitle" style="margin-top:8px">Waiting for GPS…</div>
    </div>

    <div class="card">
        <h2>Next salah</h2>
        <div class="countdown pulse" id="nextSalahCountdown">--:--</div>
        <div id="nextSalahDescription" class="subtitle">calculating</div>
    </div>

    <div class="card">
        <h2>Next haram time</h2>
        <div class="countdown" id="nextHaramCountdown">--:--</div>
        <div id="nextHaramDescription" class="subtitle">calculating</div>
    </div>

    <div class="card">
        <h2>Ramadan times</h2>
        <div class="flex-between"><span class="event-name">Sehri ends</span> <span class="event-time"
                id="sehriEndDisplay">--:--</span></div>
        <div class="flex-between"><span class="event-name">Iftar starts</span><span class="event-time"
                id="iftarStartDisplay">--:--</span></div>
    </div>

    <div class="card">
        <h2>Daily schedule</h2>
        <div id="prayerTimesList"></div>
    </div>

    <script src="praytime.js"></script>
    <script>
        (function () {
            "use strict";

            // ── CONSTANTS ────────────────────────────────────────────────
            const PRAYER_NAMES = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];
            const ACCENTS = ['--accent-orange', '--accent-emerald', '--accent-purple', '--accent-pink', '--accent-aqua'];
            const LS = {
                theme: 'darkTheme', accent: 'selectedAccent', offsets: 'prayerOffsets',
                asr: 'asrMethod', loc: 'lastKnownLocation', net: 'savedNetworkTime'
            };

            // ── STATE ────────────────────────────────────────────────────
            const S = {
                isDark: true, accentIdx: 0,
                lat: null, lng: null,
                date: new Date(), times: null,
                asrMethod: 'Standard',
                offsets: { fajr: 0, dhuhr: 0, asr: 0, maghrib: 0, isha: 0 },
            };

            // ── DOM ──────────────────────────────────────────────────────
            const $ = id => document.getElementById(id);
            const D = {
                status: $('statusDisplay'),
                salahNum: $('nextSalahCountdown'), salahDesc: $('nextSalahDescription'),
                haramNum: $('nextHaramCountdown'), haramDesc: $('nextHaramDescription'),
                sehri: $('sehriEndDisplay'), iftar: $('iftarStartDisplay'),
                list: $('prayerTimesList'), hint: $('saveIndicator'),
            };

            // Build offset inputs dynamically
            const offsetInputs = {};
            PRAYER_NAMES.forEach(name => {
                $('offsetGrid').insertAdjacentHTML('beforeend', `
        <div class="offset-item">
          <label>${name[0].toUpperCase() + name.slice(1)}</label>
          <input type="number" id="off_${name}" step="1" value="0" />
        </div>`);
                offsetInputs[name] = $(`off_${name}`);
            });

            // ── THEME & ACCENT ───────────────────────────────────────────
            function applyTheme() {
                ['bg', 'surface', 'text', 'silver'].forEach(v =>
                    document.documentElement.style.setProperty(`--${v}`, `var(--${v}-${S.isDark ? 'dark' : 'light'})`)
                );
            }
            function toggleTheme() {
                S.isDark = !S.isDark;
                applyTheme();
                localStorage.setItem(LS.theme, S.isDark);
            }

            function applyAccent() {
                document.documentElement.style.setProperty('--accent', `var(${ACCENTS[S.accentIdx]})`);
            }
            function toggleAccent() {
                S.accentIdx = (S.accentIdx + 1) % ACCENTS.length;
                applyAccent();
                localStorage.setItem(LS.accent, S.accentIdx);
            }

            // ── OFFSETS ──────────────────────────────────────────────────
            function loadOffsets() {
                try { Object.assign(S.offsets, JSON.parse(localStorage.getItem(LS.offsets)) || {}); } catch { }
                PRAYER_NAMES.forEach(n => offsetInputs[n].value = S.offsets[n]);
            }
            function saveOffsets() {
                PRAYER_NAMES.forEach(n => S.offsets[n] = parseInt(offsetInputs[n].value, 10) || 0);
                localStorage.setItem(LS.offsets, JSON.stringify(S.offsets));
                D.hint.innerText = '💾 offsets saved';
                setTimeout(() => D.hint.innerText = '💾 offsets saved automatically', 1200);
                if (S.lat) recalc();
            }

            // ── ASR METHOD ───────────────────────────────────────────────
            function setAsr(method) {
                S.asrMethod = method;
                localStorage.setItem(LS.asr, method);
                ['Standard', 'Hanafi'].forEach(m => $(`asr${m}`).classList.toggle('active', m === method));
                if (S.lat) recalc();
            }

            // ── NETWORK TIME ─────────────────────────────────────────────
            async function syncNetworkTime() {
                try {
                    const res = await fetch('https://worldtimeapi.org/api/ip', { signal: AbortSignal.timeout(5000) });
                    const { datetime } = await res.json();
                    lsSetNet({ time: new Date(datetime).getTime(), ts: Date.now(), online: true });
                } catch {
                    const c = lsGetNet();
                    lsSetNet({ time: c ? c.time + (Date.now() - c.ts) : Date.now(), ts: Date.now(), online: false });
                }
                if (S.times) refreshUI();
            }

            const lsGetNet = () => { try { return JSON.parse(localStorage.getItem(LS.net)); } catch { return null; } };
            const lsSetNet = v => localStorage.setItem(LS.net, JSON.stringify(v));

            function now() {
                const c = lsGetNet();
                return c ? new Date(c.time + (Date.now() - c.ts)) : new Date();
            }
            function isOffline() {
                const c = lsGetNet(); return !c || c.online === false;
            }

            // ── LOCATION ─────────────────────────────────────────────────
            function onLocation(pos) {
                const { latitude: lat, longitude: lng, accuracy } = pos.coords;
                const age = Date.now() - pos.timestamp;
                S.lat = lat; S.lng = lng;
                D.status.innerText = accuracy > 500
                    ? `📍 Low accuracy (${Math.round(accuracy)}m). Move outdoors for better precision.`
                    : age > 60000
                        ? `💾 Using cached location (${Math.round(age / 1000)}s old).`
                        : `✅ ${lat.toFixed(3)}, ${lng.toFixed(3)}`;
                recalc();
                setInterval(() => { if (S.date.toDateString() === new Date().toDateString()) refreshUI(); }, 60000);
            }
            function onLocationError(e) {
                D.status.innerText =
                    e.code === 1 ? '❌ Location permission denied. Allow in site settings, then tap Refresh.' :
                        e.code === 2 ? '📡 System location appears off. Turn on GPS/location services, then tap Refresh.' :
                            e.code === 3 ? '⏳ Location request timed out. Tap Refresh to retry.' :
                                `⚠️ Unknown error: ${e.message || 'please retry'}`;
            }
            function requestLocation() {
                D.status.innerText = '⏳ Detecting location…';
                navigator.geolocation.getCurrentPosition(onLocation, onLocationError,
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 });
            }
            function startWithCache() {
                const c = JSON.parse(localStorage.getItem(LS.loc) || 'null');
                const ts = c?.ts ?? c?.timestamp; // support both key names
                if (c && ts && (Date.now() - ts) < 168 * 3600000) {
                    S.lat = c.lat; S.lng = c.lng;
                    D.status.innerText = `📦 Cached location (${Math.round((Date.now() - ts) / 3600000)}h old) • refreshing…`;
                    recalc();
                }
                requestLocation();
            }

            // ── PRAYER CALCULATIONS ──────────────────────────────────────
            const prayTime = new PrayTime('Karachi');

            function recalc() {
                if (!S.lat) return;
                prayTime.location([S.lat, S.lng]);
                prayTime.adjust({ asr: S.asrMethod });
                prayTime.tune(S.offsets);
                prayTime.set({ format: '24h', timezone: Intl.DateTimeFormat().resolvedOptions().timeZone });

                const t = prayTime.times(S.date);
                const toMin = str => { if (!str || str.includes('-')) return NaN; const [h, m] = str.split(':').map(Number); return h * 60 + m; };
                const [fajr, sunrise, dhuhr, asr, maghrib, isha] = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'].map(k => toMin(t[k]));

                S.times = {
                    fajr, sunrise, dhuhr, asr, maghrib, isha,
                    sehriEnd: fajr,
                    iftarStart: maghrib + 1,
                    asrEnd: maghrib - 25,
                    zawalStart: dhuhr - 5,
                    zawalEnd: dhuhr + 5,
                    sunriseEnd: sunrise + 15,
                    sunsetStart: maghrib - 15,
                    maghribEnd: maghrib + 25,
                };
                refreshUI();
            }

            // ── FORMATTERS ───────────────────────────────────────────────
            function fmt(m) {
                if (m == null || isNaN(m)) return '--:--';
                m = ((m % 1440) + 1440) % 1440;
                const h = Math.floor(m / 60), min = Math.floor(m % 60);
                return `${h % 12 || 12}:${String(min).padStart(2, '0')} ${h >= 12 ? 'pm' : 'am'}`;
            }
            function dur(d) {
                if (d < 0 || isNaN(d)) return '--:--';
                return `${Math.floor(d / 60)}h ${Math.floor(d % 60)}m`;
            }

            // ── UI REFRESH ───────────────────────────────────────────────
            function refreshUI() {
                const t = S.times; if (!t) return;
                const n = now(), isToday = S.date.toDateString() === n.toDateString();
                const cur = n.getHours() * 60 + n.getMinutes() + n.getSeconds() / 60;

                D.sehri.innerText = fmt(t.sehriEnd);
                D.iftar.innerText = fmt(t.iftarStart);

                const prayers = [
                    { name: 'Fajr', start: t.fajr, end: t.sunrise },
                    { name: 'Dhuhr', start: t.dhuhr, end: t.asr },
                    { name: 'Asr', start: t.asr, end: t.asrEnd },
                    { name: 'Maghrib', start: t.maghrib, end: t.maghribEnd },
                    { name: 'Isha', start: t.isha, end: t.fajr + 1440 },
                ];

                const note = `<div style="font-size:.75rem;opacity:.7;margin-top:8px">
            ${isOffline() ? '📵 Offline - using saved network time' : '⏰ Not adjusted to phone time, using network time.'}
        </div>`;
                D.list.innerHTML = prayers.map(p => `
            <div class="flex-between">
            <span class="event-name">${p.name}</span>
            <span class="event-time">${fmt(p.start)} – ${fmt(p.end)}</span>
            </div>`).join('') + note;

                if (!isToday) {
                    D.salahNum.innerText = D.haramNum.innerText = '--:--';
                    D.salahDesc.innerText = D.haramDesc.innerText = '📅 switch to today';
                    return;
                }

                // Next salah
                const nextP = prayers.find(p => p.start > cur) || { ...prayers[0], start: prayers[0].start + 1440 };
                D.salahNum.innerText = dur(nextP.start - cur);
                D.salahDesc.innerText = `${nextP.name} at ${fmt(nextP.start > 1440 ? nextP.start - 1440 : nextP.start)}`;

                // Next haram
                const harams = [
                    { name: 'Sunrise buffer', start: t.sunrise, end: t.sunriseEnd },
                    { name: 'Zawal mid-day', start: t.zawalStart, end: t.zawalEnd },
                    { name: 'Sunset pale', start: t.sunsetStart, end: t.maghrib },
                ];
                const nextH = harams.find(h => h.start > cur) || { ...harams[0], start: harams[0].start + 1440 };
                D.haramNum.innerText = dur(nextH.start - cur);
                D.haramDesc.innerText = `${nextH.name} at ${fmt(nextH.start > 1440 ? nextH.start - 1440 : nextH.start)}`;
            }

            // ── SERVICE WORKER ───────────────────────────────────────────
            if ('serviceWorker' in navigator) {
                const sw = `
            const C = 'prayer-v1.0.4';
            self.addEventListener('install',  e => { e.waitUntil(caches.open(C).then(c => c.addAll(['/']))); self.skipWaiting(); });
            self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k => k!==C).map(k => caches.delete(k))))); self.clients.claim(); });
            self.addEventListener('fetch', e => e.respondWith(
            caches.match(e.request).then(r => r || fetch(e.request).then(res => {
                if (e.request.url.startsWith('http')) caches.open(C).then(c => c.put(e.request, res.clone()));
                return res;
            }).catch(() => new Response('Offline', { status: 503 })))
            ));`;
                navigator.serviceWorker
                    .register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' })))
                    .then(r => console.log('✅ SW:', r.scope))
                    .catch(e => console.log('❌ SW:', e));
            }

            // ── INIT ─────────────────────────────────────────────────────
            // Theme
            S.isDark = localStorage.getItem(LS.theme) !== 'false';
            applyTheme();

            // Accent
            S.accentIdx = Math.min(parseInt(localStorage.getItem(LS.accent) || '0', 10), ACCENTS.length - 1) || 0;
            applyAccent();

            // Offsets & Asr
            loadOffsets();
            const savedAsr = localStorage.getItem(LS.asr);
            if (savedAsr === 'Hanafi' || savedAsr === 'Standard') S.asrMethod = savedAsr;
            setAsr(S.asrMethod);

            // Date picker
            const dp = $('datePicker');
            dp.valueAsDate = new Date();
            dp.addEventListener('change', e => {
                const [y, m, d] = e.target.value.split('-');
                S.date = new Date(y, m - 1, d);
                if (S.lat) recalc();
            });

            // Buttons
            $('themeToggle').addEventListener('click', toggleTheme);
            $('accentToggle').addEventListener('click', toggleAccent);
            $('asrStandard').addEventListener('click', () => setAsr('Standard'));
            $('asrHanafi').addEventListener('click', () => setAsr('Hanafi'));
            $('retryLocationBtn').addEventListener('click', requestLocation);
            PRAYER_NAMES.forEach(n => offsetInputs[n].addEventListener('input', saveOffsets));

            // Start
            startWithCache();
            syncNetworkTime();
            setInterval(() => { if (S.date.toDateString() === now().toDateString()) refreshUI(); }, 30000);
            setInterval(() => { if (isOffline()) syncNetworkTime(); }, 300000);

        })();
    </script>
</body>

</html>
