<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Prayer Times Offline</title>

    <!-- PWA meta & icons -->
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="icon" type="image/svg+xml"

    <script id="manifestScript">
        const manifestIcon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 225 225'%3E%3Crect width='225' height='225' fill='%231a1a1a'/%3E%3Cpath d='M107 179.5l-24-1-12-4-15-9-16.5-18.5-9-25 2-29 12-23 20.5-17.5 24-8h18l15 4 19 11 9.5 10.5-7.5 2.5-16-13-21-7-5.5.5-.5 8.5-4.5-.5-.5-8.5-20 4-15 9-13.5 15.5-6 13-2 15 8.5.5.5 4.5-8.5.5-.5 6.5 3 12 7 13 18.5 17.5 22 8 6.5-.5.5-8.5 4.5.5.5 8.5 23.5-5.5-.5 8.5zm-7-62l-5 0-3-3-21.5-.5.5-4.5 21 0 3.5-3.5.5-31.5 4.5 1.5v31l3 3v4zm53-14l-10.5-3.5-7-20 22.5-6.5 6.5 19.5-6.5 8.5zm27 68l-36.5-.5-.5-9.5 17.5.5-19-3-4-23v-16l2-8 4.5-4.5 6-1 6 3 4.5 5.5 3.5 12.5 13-6 5.5 6.5-3.5 5.5-13 7-9.5 0-9.5-7.5 6.5 7.5 11 1 4 6 20 6 4.5 4.5v7l-5.5 4.5zm6-46l-6.5-4.5 9-7 1.5-4.5 1.5 5.5zm-44 46l-11 0-2.5-4.5 3.5-3.5 8-1z' fill='%23f5f5f5'/%3E%3C/svg%3E";

        const manifest = {
            name: "Prayer Times",
            short_name: "Prayer",
            description: "Accurate prayer times with offsets",
            display: "standalone",
            orientation: "portrait",
            background_color: "#1a1a1a",
            theme_color: "#1a1a1a",
            start_url: "./",
            version: "1.0.6",

        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);

    <style>
        /* ---------- CSS VARIABLES (THEME) ---------- */
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --surface-dark: #1c1c1c;
            --text-dark: #e0e0e0;
            --silver-dark: #a0a0a0;
            --bg-light: #e8e8e8;
            --surface-light: #ffffff;
            --text-light: #1a1a1a;
            --silver-light: #606060;
            --accent-orange: #f57c00;
            --accent-emerald: #10b981;
            --accent-purple: #9b59b6;
            --accent-pink: #e91e8f;
            --accent-aqua: #00bcd4;
            --bg: var(--bg-dark);
            --surface: var(--surface-dark);
            --text: var(--text-dark);
            --silver: var(--silver-dark);
            --accent: var(--accent-orange);
        }

        body {
            margin: 0;
            padding: 18px 14px 28px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s, color 0.2s;
            max-width: 560px;
            margin-left: auto;
            margin-right: auto;
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        button,
        input[type="date"] {
            flex: 1 1 0;
            min-width: 100px;
            padding: 12px 6px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 0.95rem;
            background: var(--surface);
            color: var(--text);
            border: 1.8px solid var(--silver);
            outline: none;
            transition: border 0.15s, background 0.15s;
            cursor: pointer;
            text-align: center;
        }

        button:hover,
        input[type="date"]:focus {
            border-color: var(--accent);
        }

        .card {
            background: var(--surface);
            border-radius: 22px;
            padding: 20px 18px;
            margin-bottom: 18px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(128, 128, 128, 0.08);
        }

        h2 {
            margin: 0 0 12px 0;
            font-size: 0.95rem;
            color: var(--silver);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .countdown {
            font-size: 2.4rem;
            font-weight: 700;
            margin: 6px 0 4px;
            color: var(--accent);
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--silver);
            font-weight: 400;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(128, 128, 128, 0.12);
        }

        .flex-between:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .event-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .event-time {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        .offset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 12px 10px;
            margin-top: 6px;
        }

        .offset-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .offset-item label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--silver);
            font-weight: 600;
        }

        .offset-item input {
            background: var(--bg);
            border: 1.8px solid var(--silver);
            color: var(--text);
            padding: 10px 6px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            outline: none;
            transition: border 0.15s;
        }

        .offset-item input:focus {
            border-color: var(--accent);
        }

        .locate-btn {
            background: transparent;
            border: 1.8px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 8px;
        }

        .locate-btn:hover {
            background: var(--accent);
            color: #0a0a0a;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .saved-hint {
            font-size: 0.7rem;
            margin-top: 8px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <!-- ---------- UI CONTROLS ---------- -->
    <div class="controls">
        <button id="themeToggle">🌓 Theme</button>
        <button id="accentToggle">🎨 Accent</button>
        <input type="date" id="datePicker" />
    </div>

    <!-- OFFSET PANEL -->
    <div class="card" style="padding: 18px 16px">
        <h2>⏱️ TIME OFFSETS (minutes)</h2>
        <div class="offset-grid">
            <div class="offset-item"><label>Fajr</label><input type="number" id="offsetFajr" step="1" value="0" /></div>
            <div class="offset-item"><label>Dhuhr</label><input type="number" id="offsetDhuhr" step="1" value="0" />
            </div>
            <div class="offset-item"><label>Asr</label><input type="number" id="offsetAsr" step="1" value="0" /></div>
            <div class="offset-item"><label>Maghrib</label><input type="number" id="offsetMaghrib" step="1" value="0" />
            </div>
            <div class="offset-item"><label>Isha</label><input type="number" id="offsetIsha" step="1" value="0" /></div>
        </div>

        <!-- ASR METHOD TOGGLE -->
        <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(128,128,128,0.12);">
            <label
                style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--silver); font-weight: 600; display: block; margin-bottom: 6px;">
                Asr Calculation
            </label>
            <div style="display: flex; gap: 8px;">
                <button id="asrStandard" class="asr-method-btn active"
                    style="flex: 1; padding: 10px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; background: var(--accent); color: var(--bg); border: none; cursor: pointer; transition: 0.2s;">
                    Standard (Shafi'i)
                </button>
                <button id="asrHanafi" class="asr-method-btn"
                    style="flex: 1; padding: 10px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; background: var(--surface); color: var(--silver); border: 1.8px solid var(--silver); cursor: pointer; transition: 0.2s;">
                    Hanafi
                </button>
            </div>
        </div>

        <div class="saved-hint" id="saveIndicator">💾 offsets saved automatically</div>
    </div>

    <!-- LOCATION STATUS -->
    <div class="card">
        <div class="status-row">
            <h2 style="margin:0">📍 Status</h2>
            <button class="locate-btn" id="retryLocationBtn">⟳ Refresh</button>
        </div>
        <div id="statusDisplay" class="subtitle" style="margin-top:8px">Waiting for GPS…</div>
    </div>

    <!-- NEXT SALAH -->
    <div class="card">
        <h2>Next salah</h2>
        <div class="countdown pulse" id="nextSalahCountdown">--:--</div>
        <div id="nextSalahDescription" class="subtitle">calculating</div>
    </div>

    <!-- NEXT HARAM TIME -->
    <div class="card">
        <h2>Next haram time</h2>
        <div class="countdown" id="nextHaramCountdown">--:--</div>
        <div id="nextHaramDescription" class="subtitle">calculating</div>
    </div>

    <!-- RAMADAN TIMES -->
    <div class="card">
        <h2>Ramadan times</h2>
        <div class="flex-between"><span class="event-name">Sehri ends</span><span class="event-time"
                id="sehriEndDisplay">--:--</span></div>
        <div class="flex-between"><span class="event-name">Iftar starts</span><span class="event-time"
                id="iftarStartDisplay">--:--</span></div>
    </div>

    <!-- DAILY SCHEDULE -->
    <div class="card">
        <h2>Daily schedule</h2>
        <div id="prayerTimesList"></div>
    </div>

    <script src="praytime.js"></script>
    <script>
        (function () {
            "use strict";

            // ---------- DOM ELEMENTS ----------
            const DOM = {
                themeToggle: document.getElementById('themeToggle'),
                accentToggle: document.getElementById('accentToggle'),
                datePicker: document.getElementById('datePicker'),
                statusDisplay: document.getElementById('statusDisplay'),
                nextSalahCountdown: document.getElementById('nextSalahCountdown'),
                nextSalahDescription: document.getElementById('nextSalahDescription'),
                nextHaramCountdown: document.getElementById('nextHaramCountdown'),
                nextHaramDescription: document.getElementById('nextHaramDescription'),
                sehriEndDisplay: document.getElementById('sehriEndDisplay'),
                iftarStartDisplay: document.getElementById('iftarStartDisplay'),
                prayerTimesList: document.getElementById('prayerTimesList'),
                saveIndicator: document.getElementById('saveIndicator'),
                retryLocationBtn: document.getElementById('retryLocationBtn'),
                offsetInputs: {
                    fajr: document.getElementById('offsetFajr'),
                    dhuhr: document.getElementById('offsetDhuhr'),
                    asr: document.getElementById('offsetAsr'),
                    maghrib: document.getElementById('offsetMaghrib'),
                    isha: document.getElementById('offsetIsha')
                }
            };

            // ---------- APPLICATION STATE ----------
            const state = {
                isDarkTheme: true,
                currentAccentIndex: 0,
                userLatitude: null,
                userLongitude: null,
                selectedDate: new Date(),
                calculatedPrayerTimes: null,
                networkTime: null, // Direct network time
                asrMethod: 'Standard',
                prayerOffsets: {
                    fajr: 0,
                    dhuhr: 0,
                    asr: 0,
                    maghrib: 0,
                    isha: 0
                },
                locationWatchId: null,
                isWaitingForLocationRestore: false
            };

            const ACCENTS = [
                { name: 'Orange', var: '--accent-orange' },
                { name: 'Emerald', var: '--accent-emerald' },
                { name: 'Purple', var: '--accent-purple' },
                { name: 'Pink', var: '--accent-pink' },
                { name: 'Aqua', var: '--accent-aqua' }
            ];
            const ACCENT_STORAGE_KEY = 'selectedAccent';

            const LOCATION_CACHE_KEY = 'lastKnownLocation';

            const NETWORK_TIME_KEY = 'savedNetworkTime';

            // ---------- THEME & ACCENT HELPERS ----------
            function toggleTheme() {
                state.isDarkTheme = !state.isDarkTheme;
                applyCurrentTheme();
                localStorage.setItem('darkTheme', state.isDarkTheme);
            }

            function applyCurrentTheme() {
                const root = document.documentElement.style;
                root.setProperty('--bg', state.isDarkTheme ? 'var(--bg-dark)' : 'var(--bg-light)');
                root.setProperty('--surface', state.isDarkTheme ? 'var(--surface-dark)' : 'var(--surface-light)');
                root.setProperty('--text', state.isDarkTheme ? 'var(--text-dark)' : 'var(--text-light)');
                root.setProperty('--silver', state.isDarkTheme ? 'var(--silver-dark)' : 'var(--silver-light)');
            }

            function loadThemeFromStorage() {
                const saved = localStorage.getItem('darkTheme');
                if (saved !== null) {
                    state.isDarkTheme = saved === 'true';
                }
                applyCurrentTheme();
            }

            function applyCurrentAccent() {
                const accentVar = ACCENTS[state.currentAccentIndex].var;
                document.documentElement.style.setProperty('--accent', `var(${accentVar})`);
            }

            function toggleAccent() {
                state.currentAccentIndex = (state.currentAccentIndex + 1) % ACCENTS.length;
                applyCurrentAccent();
                saveAccentToStorage();
            }

            function saveAccentToStorage() {
                localStorage.setItem(ACCENT_STORAGE_KEY, state.currentAccentIndex);
            }

            function loadAccentFromStorage() {
                const saved = localStorage.getItem(ACCENT_STORAGE_KEY);
                if (saved !== null) {
                    const index = parseInt(saved, 10);
                    if (!isNaN(index) && index >= 0 && index < ACCENTS.length) {
                        state.currentAccentIndex = index;
                    }
                }
                applyCurrentAccent();
            }

            // ---------- OFFSET PERSISTENCE ----------
            const OFFSET_STORAGE_KEY = 'prayerOffsets';
            const ASR_METHOD_KEY = 'asrMethod';

            function loadOffsetsFromStorage() {
                const stored = localStorage.getItem(OFFSET_STORAGE_KEY);
                if (!stored) return;
                try {
                    const parsed = JSON.parse(stored);
                    state.prayerOffsets.fajr = parsed.fajr ?? 0;
                    state.prayerOffsets.dhuhr = parsed.dhuhr ?? 0;
                    state.prayerOffsets.asr = parsed.asr ?? 0;
                    state.prayerOffsets.maghrib = parsed.maghrib ?? 0;
                    state.prayerOffsets.isha = parsed.isha ?? 0;
                } catch (e) { /* keep defaults */ }
                syncInputsFromOffsets();
            }

            function saveOffsetsToStorage() {
                localStorage.setItem(OFFSET_STORAGE_KEY, JSON.stringify(state.prayerOffsets));
                DOM.saveIndicator.style.opacity = '1';
                DOM.saveIndicator.innerText = '💾 offsets saved';
                setTimeout(() => { DOM.saveIndicator.innerText = '💾 offsets saved automatically'; }, 1200);
            }

            function syncInputsFromOffsets() {
                DOM.offsetInputs.fajr.value = state.prayerOffsets.fajr;
                DOM.offsetInputs.dhuhr.value = state.prayerOffsets.dhuhr;
                DOM.offsetInputs.asr.value = state.prayerOffsets.asr;
                DOM.offsetInputs.maghrib.value = state.prayerOffsets.maghrib;
                DOM.offsetInputs.isha.value = state.prayerOffsets.isha;
            }

            function handleOffsetInputChange() {
                state.prayerOffsets.fajr = parseInt(DOM.offsetInputs.fajr.value, 10) || 0;
                state.prayerOffsets.dhuhr = parseInt(DOM.offsetInputs.dhuhr.value, 10) || 0;
                state.prayerOffsets.asr = parseInt(DOM.offsetInputs.asr.value, 10) || 0;
                state.prayerOffsets.maghrib = parseInt(DOM.offsetInputs.maghrib.value, 10) || 0;
                state.prayerOffsets.isha = parseInt(DOM.offsetInputs.isha.value, 10) || 0;
                saveOffsetsToStorage();
                if (state.userLatitude && state.userLongitude) recalculateAndUpdateUI();
            }

            function loadAsrMethodFromStorage() {
                const saved = localStorage.getItem(ASR_METHOD_KEY);
                if (saved === 'Hanafi' || saved === 'Standard') {
                    state.asrMethod = saved;
                }
                updateAsrButtonStates();
            }

            function saveAsrMethodToStorage() {
                localStorage.setItem(ASR_METHOD_KEY, state.asrMethod);
            }

            function updateAsrButtonStates() {
                const standardBtn = document.getElementById('asrStandard');
                const hanafiBtn = document.getElementById('asrHanafi');

                if (state.asrMethod === 'Standard') {
                    standardBtn.classList.add('active');
                    standardBtn.style.background = 'var(--accent)';
                    standardBtn.style.color = 'var(--bg)';
                    standardBtn.style.border = 'none';

                    hanafiBtn.classList.remove('active');
                    hanafiBtn.style.background = 'var(--surface)';
                    hanafiBtn.style.color = 'var(--silver)';
                    hanafiBtn.style.border = '1.8px solid var(--silver)';
                } else {
                    hanafiBtn.classList.add('active');
                    hanafiBtn.style.background = 'var(--accent)';
                    hanafiBtn.style.color = 'var(--bg)';
                    hanafiBtn.style.border = 'none';

                    standardBtn.classList.remove('active');
                    standardBtn.style.background = 'var(--surface)';
                    standardBtn.style.color = 'var(--silver)';
                    standardBtn.style.border = '1.8px solid var(--silver)';
                }
            }

            function setAsrMethod(method) {
                state.asrMethod = method;
                saveAsrMethodToStorage();
                updateAsrButtonStates();
                if (state.userLatitude && state.userLongitude) recalculateAndUpdateUI();
            }

            // ---------- NETWORK TIME SYNC ----------
            async function synchronizeNetworkTime() {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 5000);

                    const response = await fetch('https://worldtimeapi.org/api/ip', {
                        signal: controller.signal
                    });
                    clearTimeout(timeout);

                    const data = await response.json();
                    state.networkTime = new Date(data.datetime);

                    localStorage.setItem(NETWORK_TIME_KEY, JSON.stringify({
                        time: state.networkTime.getTime(),
                        timestamp: Date.now(),
                        online: true
                    }));

                    console.log(`✅ Network time synced: ${state.networkTime.toLocaleString()}`);
                    if (state.calculatedPrayerTimes) refreshUIDisplay();

                } catch (error) {
                    const cached = localStorage.getItem(NETWORK_TIME_KEY);
                    if (cached) {
                        try {
                            const { time, timestamp } = JSON.parse(cached);
                            const age = Date.now() - timestamp;
                            state.networkTime = new Date(time + age);
                            console.log(`📦 Using cached network time (${Math.round(age / 3600000)}h old)`);
                        } catch {
                            state.networkTime = new Date();
                        }
                    } else {
                        state.networkTime = new Date();
                        console.log(`📵 First time offline - using device time`);
                    }

                    // Save offline indicator
                    localStorage.setItem(NETWORK_TIME_KEY, JSON.stringify({
                        time: state.networkTime.getTime(),
                        timestamp: Date.now(),
                        online: false
                    }));

                    if (state.calculatedPrayerTimes) refreshUIDisplay();
                }
            }

            function getCurrentTime() {
                // Auto-adjust cached time
                const cached = localStorage.getItem(NETWORK_TIME_KEY);
                if (cached) {
                    const { time, timestamp } = JSON.parse(cached);
                    const elapsed = Date.now() - timestamp;
                    return new Date(time + elapsed);
                }
                return state.networkTime || new Date();
            }

            function isOffline() {
                const cached = localStorage.getItem(NETWORK_TIME_KEY);
                if (!cached) return true;
                try {
                    return JSON.parse(cached).online === false;
                } catch {
                    return true;
                }
            }

            // ---------- LOCATION HANDLING ----------
            async function checkLocationPermissionState() {
                if (!navigator.permissions) return 'unknown';
                try {
                    const result = await navigator.permissions.query({ name: 'geolocation' });
                    return result.state; // 'granted', 'denied', or 'prompt'
                } catch {
                    return 'unknown';
                }
            }

            function handleLocationError(error) {
                const errorMessages = {
                    1: '❌ Location permission denied. Allow in site settings, then tap Refresh.',
                    2: '📍 Location unavailable. Move to an open area or tap Refresh.',
                    3: '⏳ Location request timed out. Tap Refresh to retry.'
                };

                if (error.code === error.PERMISSION_DENIED) {
                    DOM.statusDisplay.innerText = errorMessages[1];
                } else if (error.code === error.POSITION_UNAVAILABLE) {
                    DOM.statusDisplay.innerText = '📡 System location appears off. Turn on GPS/location services, then tap Refresh.';
                } else if (error.code === error.TIMEOUT) {
                    DOM.statusDisplay.innerText = errorMessages[3];
                } else {
                    DOM.statusDisplay.innerText = `⚠️ Unknown error: ${error.message || 'please retry'}`;
                }
            }

            function locationSuccessCallback(pos) {
                // Clear any active watch
                if (state.locationWatchId) {
                    navigator.geolocation.clearWatch(state.locationWatchId);
                    state.locationWatchId = null;
                }
                state.isWaitingForLocationRestore = false;

                const accuracy = pos.coords.accuracy;
                const age = Date.now() - pos.timestamp;

                if (accuracy > 500) {
                    DOM.statusDisplay.innerText = `📍 Low accuracy (${Math.round(accuracy)}m). Move outdoors for better precision.`;
                } else if (age > 60000) {
                    DOM.statusDisplay.innerText = `💾 Using cached location (${Math.round(age / 1000)}s old).`;
                } else {
                    DOM.statusDisplay.innerText = `✅ ${pos.coords.latitude.toFixed(3)}, ${pos.coords.longitude.toFixed(3)}`;
                }

                state.userLatitude = pos.coords.latitude;
                state.userLongitude = pos.coords.longitude;
                recalculateAndUpdateUI();

                // Periodic refresh for "today" view
                setInterval(() => {
                    if (state.selectedDate.toDateString() === new Date().toDateString()) {
                        refreshUIDisplay();
                    }
                }, 60000);
            }

            function requestGeolocation() {
                // Clear any existing watch
                if (state.locationWatchId) {
                    navigator.geolocation.clearWatch(state.locationWatchId);
                    state.locationWatchId = null;
                }
                state.isWaitingForLocationRestore = false;

                // Simple status message
                DOM.statusDisplay.innerText = '⏳ Detecting location…';

                const options = {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 60000  // Accept 1-minute cached position
                };

                // Direct request - browser handles permission prompts automatically
                navigator.geolocation.getCurrentPosition(
                    locationSuccessCallback,
                    handleLocationError,
                    options
                );
            }

            function saveLocationToCache(lat, lng) {
                localStorage.setItem(LOCATION_CACHE_KEY, JSON.stringify({
                    lat,
                    lng,
                    timestamp: Date.now()
                }));
            }

            function loadLocationFromCache() {
                const cached = localStorage.getItem(LOCATION_CACHE_KEY);
                if (!cached) return null;

                try {
                    const { lat, lng, timestamp } = JSON.parse(cached);
                    const ageHours = (Date.now() - timestamp) / 3600000;

                    // Accept cache up to 7 days old
                    if (ageHours < 168) {
                        return { lat, lng, ageHours };
                    }
                } catch (e) { }

                return null;
            }

            function quickStartWithCache() {
                const cached = loadLocationFromCache();

                if (cached) {
                    state.userLatitude = cached.lat;
                    state.userLongitude = cached.lng;

                    DOM.statusDisplay.innerText = `📦 Cached location (${Math.round(cached.ageHours)}h old) • refreshing…`;

                    // Calculate & show times immediately
                    recalculateAndUpdateUI();

                    // Request fresh GPS in background (will update when ready)
                    requestGeolocation();
                } else {
                    // No cache - normal GPS request
                    requestGeolocation();
                }
            }

            // ---------- ASTRONOMY CALCULATIONS ----------
            const Astro = (() => {
                const prayTime = new PrayTime('Karachi');

                return {
                    computePrayerTimes(date, latitude, longitude, offsets, asrMethod) {
                        prayTime.location([latitude, longitude]);
                        prayTime.adjust({ asr: asrMethod });
                        prayTime.tune({
                            fajr: offsets.fajr,
                            dhuhr: offsets.dhuhr,
                            asr: offsets.asr,
                            maghrib: offsets.maghrib,
                            isha: offsets.isha
                        });

                        // Force consistent timezone handling - use local timezone
                        prayTime.set({
                            format: '24h',
                            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                        });

                        const times = prayTime.times(date);

                        const toMin = (str) => {
                            if (!str || str.includes('-')) return NaN;
                            const [h, m] = str.split(':').map(Number);
                            return h * 60 + m;
                        };

                        const fajrMin = toMin(times.fajr);
                        const sunriseMin = toMin(times.sunrise);
                        const dhuhrMin = toMin(times.dhuhr);
                        const asrMin = toMin(times.asr);
                        const maghribMin = toMin(times.maghrib);
                        const ishaMin = toMin(times.isha);

                        return {
                            fajr: fajrMin,
                            sunrise: sunriseMin,
                            dhuhr: dhuhrMin,
                            asr: asrMin,
                            maghrib: maghribMin,
                            isha: ishaMin,
                            sehriEnd: fajrMin,
                            iftarStart: maghribMin + 1,
                            asrEnd: maghribMin - 25,
                            zawalStart: dhuhrMin - 5,
                            zawalEnd: dhuhrMin + 5,
                            sunriseEnd: sunriseMin + 15,
                            sunsetStart: maghribMin - 15,
                            maghribEnd: maghribMin + 25
                        };
                    },

                    formatTimeFromMinutes: (totalMinutes) => {
                        if (totalMinutes === undefined || totalMinutes === null || isNaN(totalMinutes)) return '--:--';
                        let mins = Math.floor(((totalMinutes % 1440) + 1440) % 1440);
                        const hours = Math.floor(mins / 60);
                        const minutes = mins % 60;
                        const ampm = hours >= 12 ? 'pm' : 'am';
                        let displayHour = hours % 12;
                        if (displayHour === 0) displayHour = 12;
                        return `${displayHour}:${minutes < 10 ? '0' : ''}${minutes} ${ampm}`;
                    },

                    formatDuration: (minutesDiff) => {
                        if (minutesDiff < 0 || isNaN(minutesDiff)) return '--:--';
                        const hrs = Math.floor(minutesDiff / 60);
                        const mins = Math.floor(minutesDiff % 60);
                        return `${hrs}h ${mins}m`;
                    }
                };
            })();

            // ---------- CALCULATION & UI UPDATE ----------
            function recalculateAndUpdateUI() {
                if (!state.userLatitude || !state.userLongitude) return;

                state.calculatedPrayerTimes = Astro.computePrayerTimes(
                    state.selectedDate,
                    state.userLatitude,
                    state.userLongitude,
                    state.prayerOffsets,
                    state.asrMethod
                );
                refreshUIDisplay();
            }

            function refreshUIDisplay() {
                const times = state.calculatedPrayerTimes;
                if (!times) return;

                const now = getCurrentTime(); // Use network time
                const isToday = state.selectedDate.toDateString() === now.toDateString();
                const currentMinutes = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;

                DOM.sehriEndDisplay.innerText = Astro.formatTimeFromMinutes(times.sehriEnd);
                DOM.iftarStartDisplay.innerText = Astro.formatTimeFromMinutes(times.iftarStart);

                const prayers = [
                    { name: 'Fajr', start: times.fajr, end: times.sunrise },
                    { name: 'Dhuhr', start: times.dhuhr, end: times.asr },
                    { name: 'Asr', start: times.asr, end: times.asrEnd },
                    { name: 'Maghrib', start: times.maghrib, end: times.maghribEnd },
                    { name: 'Isha', start: times.isha, end: times.fajr + 1440 }
                ];

                const offline = isOffline();
                const statusMsg = offline
                    ? '<div style="font-size: 0.75rem; opacity: 0.7; margin-top: 8px;">📵 Offline - using saved network time</div>'
                    : '<div style="font-size: 0.75rem; opacity: 0.7; margin-top: 8px;">⏰ Not adjusted to phone time, using network time.</div>';

                DOM.prayerTimesList.innerHTML = prayers.map(p => `
        <div class="flex-between">
          <span class="event-name">${p.name}</span>
          <span class="event-time">${Astro.formatTimeFromMinutes(p.start)} – ${Astro.formatTimeFromMinutes(p.end)}</span>
        </div>
    `).join('') + statusMsg;

                if (!isToday) {
                    DOM.nextSalahCountdown.innerText = '--:--';
                    DOM.nextSalahDescription.innerText = '📅 switch to today';
                    DOM.nextHaramCountdown.innerText = '--:--';
                    DOM.nextHaramDescription.innerText = '📅 switch to today';
                    return;
                }

                const upcomingPrayer = prayers.find(p => p.start > currentMinutes) ||
                    { ...prayers[0], start: prayers[0].start + 1440 };
                DOM.nextSalahCountdown.innerText = Astro.formatDuration(upcomingPrayer.start - currentMinutes);
                const displayStart = upcomingPrayer.start > 1440 ? upcomingPrayer.start - 1440 : upcomingPrayer.start;
                DOM.nextSalahDescription.innerText = `${upcomingPrayer.name} at ${Astro.formatTimeFromMinutes(displayStart)}`;

                const haramPeriods = [
                    { name: 'Sunrise buffer', start: times.sunrise, end: times.sunriseEnd },
                    { name: 'Zawal mid-day', start: times.zawalStart, end: times.zawalEnd },
                    { name: 'Sunset pale', start: times.sunsetStart, end: times.maghrib }
                ];

                const upcomingHaram = haramPeriods.find(h => h.start > currentMinutes) ||
                    { ...haramPeriods[0], start: haramPeriods[0].start + 1440 };
                DOM.nextHaramCountdown.innerText = Astro.formatDuration(upcomingHaram.start - currentMinutes);
                const haramStart = upcomingHaram.start > 1440 ? upcomingHaram.start - 1440 : upcomingHaram.start;
                DOM.nextHaramDescription.innerText = `${upcomingHaram.name} at ${Astro.formatTimeFromMinutes(haramStart)}`;
            }

            // ---------- EVENT LISTENERS & INIT ----------
            function initializeApp() {
                // Load and apply theme first
                loadThemeFromStorage();
                loadAccentFromStorage();

                // Setup theme toggle
                DOM.themeToggle.addEventListener('click', toggleTheme);

                // Setup accent toggle
                DOM.accentToggle.addEventListener('click', toggleAccent);

                // Setup date picker
                DOM.datePicker.valueAsDate = new Date();
                DOM.datePicker.addEventListener('change', (e) => {
                    const [year, month, day] = e.target.value.split('-');
                    state.selectedDate = new Date(year, month - 1, day);
                    if (state.userLatitude && state.userLongitude) recalculateAndUpdateUI();
                });

                // Load offsets and setup listeners
                loadOffsetsFromStorage();
                loadOffsetsFromStorage();
                loadAsrMethodFromStorage();

                Object.values(DOM.offsetInputs).forEach(input =>
                    input.addEventListener('input', handleOffsetInputChange)
                );

                // Asr method toggle buttons
                document.getElementById('asrStandard').addEventListener('click', () => setAsrMethod('Standard'));
                document.getElementById('asrHanafi').addEventListener('click', () => setAsrMethod('Hanafi'));

                // Refresh location button
                DOM.retryLocationBtn.addEventListener('click', requestGeolocation);

                requestGeolocation();
                quickStartWithCache();
                synchronizeNetworkTime();

                // Register service worker
                if ('serviceWorker' in navigator) {
                    if ('serviceWorker' in navigator) {
                        const swCode = `
                                const CACHE_NAME = 'prayer-times-v1.0.4';
                                const ASSETS = ['/'];

                                // Install: cache the HTML page
                                self.addEventListener('install', event => {
                                    event.waitUntil(
                                        caches.open(CACHE_NAME).then(cache => {
                                            return cache.addAll(ASSETS);
                                        })
                                    );
                                    self.skipWaiting(); // Activate immediately
                                });

                                // Fetch: serve from cache, fallback to network
                                self.addEventListener('fetch', event => {
                                    event.respondWith(
                                        caches.match(event.request).then(cachedResponse => {
                                            if (cachedResponse) {
                                                return cachedResponse; // Serve cached version
                                            }
                                            // Not in cache - fetch from network
                                            return fetch(event.request).then(networkResponse => {
                                                // Optionally cache new responses
                                                if (event.request.url.startsWith('http')) {
                                                    caches.open(CACHE_NAME).then(cache => {
                                                        cache.put(event.request, networkResponse.clone());
                                                    });
                                                }
                                                return networkResponse;
                                            }).catch(() => {
                                                // Offline and not cached - return basic error
                                                return new Response('Offline - please wait for connection', {
                                                    status: 503,
                                                    statusText: 'Service Unavailable'
                                                });
                                            });
                                        })
                                    );
                                });

                                // Activate: clean old caches
                                self.addEventListener('activate', event => {
                                    event.waitUntil(
                                        caches.keys().then(cacheNames => {
                                            return Promise.all(
                                                cacheNames.map(cache => {
                                                    if (cache !== CACHE_NAME) {
                                                        return caches.delete(cache);
                                                    }
                                                })
                                            );
                                        })
                                    );
                                    self.clients.claim(); // Take control immediately
                                });
                            `;
                        const swBlob = new Blob([swCode], { type: 'application/javascript' });
                        const swUrl = URL.createObjectURL(swBlob);

                        navigator.serviceWorker.register(swUrl)
                            .then(reg => console.log('✅ Service Worker registered:', reg.scope))
                            .catch(err => console.log('❌ SW registration failed:', err));
                    }
                }
                // Auto-refresh every 30 seconds for reliability
                setInterval(() => {
                    if (state.selectedDate.toDateString() === getCurrentTime().toDateString()) {
                        refreshUIDisplay();
                    }
                }, 30000);

                // Retry network sync every 5 minutes if offline
                setInterval(() => {
                    if (isOffline()) {
                        synchronizeNetworkTime();
                    }
                }, 300000);
            }
            initializeApp();
        })();
    </script>
